<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Home</title>

    <!-- Icon -->

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

     <!-- tailwind+daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
     
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


     <!-- Style CSS -->

     <style>
        *{
              font-family: "Geist", sans-serif;

        }
     </style>



</head>
<body class="bg-[#F8FAFC]">
    
    <header>
        <div class="navbar bg-base-100 shadow-sm flex flex-col space-y-4 md:flex-row justify-between">
  <div>
    <div class="flex items-center">
        <img class="w-[45px]" src="./assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
    </div>
  </div>
  <div class="flex gap-4">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div>
        <button class="btn btn-primary"> <i class="fa-solid fa-plus"></i> New Issue</button>
    </div>
  </div>
</div>
    </header>

    <section class="w-11/12 mx-auto bg-white shadow-sm mt-8 rounded-[8px] p-5 flex gap-3.5">
        <button id="all" class="btn btn-outline btn-primary">All</button>
        <button id="open" class="btn btn-outline btn-primary">Open</button>
        <button id="closed" class="btn btn-outline btn-primary">Closed</button>
    </section>



    <section class="w-11/12 mx-auto bg-white h-full shadow-sm mt-8 rounded-[8px] p-5 flex flex-col space-y md:flex-row justify-between">
        <div class="flex gap-2 items-center">
            <img src="./assets/Aperture.png" alt="">
            <div>
                <h2 class="text-xl font-bold">50 Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

            <div class="flex gap-2 items-center">
                <div class="flex ">
                    <img src="./assets/Open-Status.png" alt="">
                    <p>Open</p>
                </div>

                <div class="flex gap-2 items-center">
                    <img src="./assets/Closed- Status .png" alt="">
                    <p>Closed</p>
                </div>
            </div>
    </section>




    <section class="w-11/12 mx-auto bg-white shadow-sm mt-8 rounded-[8px] p-5">
        <div>
            
        </div>
    </section>

</body>
</html>
